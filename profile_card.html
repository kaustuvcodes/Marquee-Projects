<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Profile Card</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #dcdcdc;
    }

    .card{
      width: 420px;
      height: 620px;
      background: white;
      border-radius: 25px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
    }

    .top{
      width: 100%;
      height: 160px;
      background: red;
    }

    .profile-img{
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 6px solid rgb(112, 96, 96);
      object-fit: cover;

      margin-top: -80px;
      background: white;
    }

    h1{
      margin-top: 20px;
      font-size: 45px;
    }

    h3{
      margin-top: 10px;
      color: gray;
      font-size: 28px;
    }

    .info{
      margin-top: 35px;
      line-height: 55px;
      font-size: 22px;
    }

    button{
      margin-top:0px;
      padding: 15px 35px;
      border: none;
      border-radius: 30px;
      background: red;
      color: white;
      font-size: 28px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <div class="card">

    <div class="top"></div>

    <!-- Put your image name here -->
    <img src="C:\Users\Kaustuv\OneDrive\Desktop\HTML.project\4b9aa41e76cb01e016c491713641240a.jpg" class="profile-img">

    <h1>Kaustuv Kumar</h1>

    <h3>MERN Developer</h3>

    <div class="info">
      <p><b>Department:</b> CSE</p>
      <p><b>Institute:</b> PIT</p>
      <p><b>University:</b> Parul University</p>
    </div>

    <button>Follow</button>

  </div>

</body>
</html>
